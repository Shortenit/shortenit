spring.application.name=shortenit
app.base-url=${APP_BASE_URL:http://localhost:3000}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/shortenit_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:0000}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

geoip.database.path=classpath:geoip/GeoLite2-City.mmdb
geoip.type=maxmind

jwt.secret=${JWT_SECRET:nhJRvKYjinJbcGkDOVL5+qlzmOVg2f7ny9dDXiNkb3sDe2otIJHiUp+drenVrpbhUcXPH9CXXzpnt4vAsvwgLw==}
jwt.access-token-expiration=3600000
jwt.refresh-token-expiration=604800000

spring.security.oauth2.client.registration.microsoft.client-id=${MICROSOFT_CLIENT_ID}
spring.security.oauth2.client.registration.microsoft.client-secret=${MICROSOFT_CLIENT_SECRET}
spring.security.oauth2.client.registration.microsoft.client-name=Microsoft
spring.security.oauth2.client.registration.microsoft.scope=openid,profile,email,User.Read
spring.security.oauth2.client.registration.microsoft.redirect-uri=${APP_BASE_URL}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.registration.microsoft.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.microsoft.client-authentication-method=client_secret_post

spring.security.oauth2.client.provider.microsoft.authorization-uri=https://login.microsoftonline.com/common/oauth2/v2.0/authorize
spring.security.oauth2.client.provider.microsoft.token-uri=https://login.microsoftonline.com/common/oauth2/v2.0/token
spring.security.oauth2.client.provider.microsoft.user-info-uri=https://graph.microsoft.com/oidc/userinfo
spring.security.oauth2.client.provider.microsoft.jwk-set-uri=https://login.microsoftonline.com/common/discovery/v2.0/keys
spring.security.oauth2.client.provider.microsoft.user-name-attribute=sub

auth.allowed-email-domain=au.edu
api-key.prefix=sk_live_
api-key.length=32

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://localhost:5173}

logging.level.org.springframework.security=DEBUG
logging.level.edu.au.life.shortenit.security=DEBUG
logging.level.org.springframework.security.oauth2=DEBUG

# Protected Admin Configuration
# The protected admin email should be set via environment variable in production
# This admin cannot be deleted or demoted, and has full admin privileges
admin.protected.email=${PROTECTED_ADMIN_EMAIL:u6611720@au.edu}

# Actuator - Health Check
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized
management.info.env.enabled=true
info.app.name=Shortenit
info.app.description=URL Shortening Service
info.app.version=1.0.0
 